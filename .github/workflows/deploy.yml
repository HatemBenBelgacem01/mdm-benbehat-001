name: ModelOps (Build, Deploy)
# Requires GitHub Action Secrets: AZURE_WEBAPP_NAME, AZURE_WEBAPP_PUBLISH_PROFILE
# Requires Azure Env Variable: AZURE_STORAGE_CONNECTION_STRING
 
on:
    # push:
    workflow_dispatch:
    workflow_run:
      workflows: ["ModelOps (Update Model)"]
      types:
        - completed

permissions:
  packages: write      

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v3
          
          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v1
          
          - name: Log in to GitHub container registry
            uses: docker/login-action@v1.10.0
            with:
                username: ${{ secrets.DOCKER_HUB_USERNAME }}
                password: ${{ secrets.DOCKER_HUB_TOKEN }}
          
          - name: Lowercase the repo name and username
            run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}
          
          - name: Build and push container image to registry
            uses: docker/build-push-action@v2
            with:
                push: true
                tags: |
                    ${{ secrets.DOCKER_HUB_USERNAME }}/mdm-benbehat-001:latest
                    ${{ secrets.DOCKER_HUB_USERNAME }}/mdm-benbehat-001:${{ github.sha }}
                file: ./Dockerfile    

    deploy:
      needs: build  
      runs-on: ubuntu-latest
          
      steps:
      - name: Lowercase the repo name and username
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}
          
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
              app-name: ${{ env.AZURE_WEBAPP_NAME }}
              publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
              images: 'ghcr.io/${{ env.REPO }}:${{ github.sha }}'
          
    
