name: ModelOps (Build, Deploy)

on:
    push:
    workflow_dispatch:
    workflow_run:
      workflows: ["ModelOps (Update Model)"]
      types:
        - completed

permissions:
  packages: write      

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v3
          
          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v1
          
          # Der Name wurde hier von GitHub Container Registry auf Docker Hub korrigiert
          - name: Log in to Docker Hub
            uses: docker/login-action@v1.10.0
            with:
                username: ${{ secrets.DOCKER_HUB_USERNAME }}
                password: ${{ secrets.DOCKER_HUB_TOKEN }}
          
          - name: Lowercase the repo name and username
            run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}
          
          - name: Build and push container image to registry
            uses: docker/build-push-action@v2
            with:
                push: true
                tags: |
                    ${{ secrets.DOCKER_HUB_USERNAME }}/mdm-benbehat-001:latest
                    ${{ secrets.DOCKER_HUB_USERNAME }}/mdm-benbehat-001:${{ github.sha }}
                file: ./Dockerfile
